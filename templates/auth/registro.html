{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white text-center">
                <h3><i class="fas fa-user-plus"></i> Registro de Psicólogo</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="confirm_password" class="form-label">Confirmar Contraseña</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="registro_profesional" class="form-label">Registro Profesional</label>
                            <input type="text" class="form-control" id="registro_profesional" name="registro_profesional">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="especialidad" class="form-label">Especialidad</label>
                            <select class="form-control" id="especialidad" name="especialidad">
                                <option value="">Seleccione...</option>
                                <option>Psicología Organizacional</option>
                                <option>Psicología Clínica</option>
                                <option>Psicología Educativa</option>
                                <option>Psicología Social</option>
                                <option>Recursos Humanos</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="plan_id" class="form-label">Selecciona tu Plan</label>
                        <select class="form-control" id="plan_id" name="plan_id" required>
                            <option value="">Seleccione un plan...</option>
                            {% for plan in planes %}
                            <option value="{{ plan.id }}">
                                {{ plan.nombre }} - S/ {{ plan.precio_mensual }}/mes 
                                ({{ plan.max_empresas }} empresas, {{ plan.max_trabajadores_mes }} trabajadores)
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-user-plus"></i> Registrarse
                    </button>
                </form>
                <hr>
                <div class="text-center">
                    <p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia Sesión</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
